name = "water-ticket-platform"
main               = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags  = ["nodejs_compat"]

# ── Staging (default) ─────────────────────────────────────────────────────────

[vars]
REDSYS_MERCHANT_CODE = "263100000"   # Test merchant code
REDSYS_TERMINAL      = "69"
PURCHASES_ENABLED    = "true"        # Set to "false" in Cloudflare dashboard to disable purchases

[[d1_databases]]
binding       = "DB"
database_name = "water-ticket-staging"
database_id   = "f305a893-388c-4504-a35c-5b4134f9b7c4"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id      = "88c87fff528d43c091262a2b1481f3e7"

[[r2_buckets]]
binding     = "VOUCHERS"
bucket_name = "vouchers-staging"

[assets]
directory = "dist/client"

[triggers]
crons = ["0 19 * * 3"]  # Wednesday 21:00 Spain (UTC+2 summer)

# ── Production ────────────────────────────────────────────────────────────────

[env.production]
name = "water-ticket-worker-production"

[[env.production.d1_databases]]
binding       = "DB"
database_name = "water-ticket-production"
database_id   = "d13ae87d-b9c1-4965-8bf2-75729f4bcc0b"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id      = "265940e3e56042328e869b2ce8634184"

[[env.production.r2_buckets]]
binding     = "VOUCHERS"
bucket_name = "vouchers-production"

[env.production.triggers]
crons = ["0 19 * * 3"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1